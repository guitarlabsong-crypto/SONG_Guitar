<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Guitar Fretboard & Stroke Area</title>
    <style>
        :root {
            --fretboard-bg: #4e342e; /* 나무색 */
            --fret-color: #d1d1d1;
            --string-color: #bdc3c7;
            --nut-color: #fff;
            --finger-color: rgba(255, 193, 7, 0.9); /* 손가락 마크 색상 */
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            display: flex;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border-radius: 8px;
            overflow: hidden;
        }

        /* 1. 지판 구역 (1~12프렛) */
        .fretboard {
            display: flex;
            position: relative;
            background: var(--fretboard-bg);
            height: 240px;
        }

        .nut {
            width: 12px;
            background: var(--nut-color);
            height: 100%;
            z-index: 10;
        }

        .fret {
            position: relative;
            border-right: 4px solid var(--fret-color);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        /* 2. 스트로크 구역 (13프렛 이후) */
        .stroke-area {
            position: relative;
            width: 300px; /* 스트로크를 위해 넉넉한 공간 */
            height: 240px;
            background: #2c1e1a; /* 지판보다 조금 어두운 바디 느낌 */
            border-left: 2px solid #000;
        }

        /* 공통 줄 스타일 */
        .string-line {
            position: absolute;
            left: 0;
            width: 100%;
            background: var(--string-color);
            z-index: 5;
            pointer-events: none; /* 줄 자체는 클릭 방해 안 함 */
        }

        /* 스트로크 구역의 줄 (클릭 가능) */
        .stroke-string {
            position: absolute;
            left: 0;
            width: 100%;
            height: 30px; /* 클릭 영역 확보 */
            cursor: pointer;
            z-index: 6;
            display: flex;
            align-items: center;
        }
        .stroke-string:hover .string-line {
            background: #fff;
            box-shadow: 0 0 8px #fff;
        }

        /* 1번 줄이 맨 위 (E4 -> E2 순서) */
        .l1 { top: 12.5%; height: 1.5px; }
        .l2 { top: 27.5%; height: 2px; }
        .l3 { top: 42.5%; height: 2.5px; }
        .l4 { top: 57.5%; height: 3px; }
        .l5 { top: 72.5%; height: 3.5px; }
        .l6 { top: 87.5%; height: 4px; }

        /* 클릭 가능한 프렛 칸 (버튼 역할) */
        .fret-cell {
            flex: 1;
            width: 100%;
            z-index: 7;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 3. 가상 손가락 동그라미 */
        .finger {
            width: 28px;
            height: 28px;
            background: var(--finger-color);
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .label { margin-bottom: 20px; font-size: 1.2rem; color: #aaa; }
    </style>
</head>
<body>

    <div class="label">왼쪽 지판에서 코드를 잡고, 오른쪽 줄을 튕겨보세요!</div>

    <div class="container">
        <div class="fretboard" id="fretboard">
            <div class="nut"></div>
            </div>

        <div class="stroke-area" id="strokeArea">
            </div>
    </div>

<script>
    const fretboard = document.getElementById('fretboard');
    const strokeArea = document.getElementById('strokeArea');

    // 1번줄(E4) ~ 6번줄(E2) 설정
    const stringNotes = ['E', 'B', 'G', 'D', 'A', 'E'];
    const openFrequencies = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41];
    const notesMaster = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    // 각 줄마다 현재 눌린 프렛 상태 저장 (0은 개방현)
    let activeFrets = [0, 0, 0, 0, 0, 0];

    // 음이름 계산 함수
    function getNoteName(stringIdx, fret) {
        const startNote = stringNotes[stringIdx];
        const startIndex = notesMaster.indexOf(startNote);
        return notesMaster[(startIndex + fret) % 12];
    }

    // 1. 지판 생성 (1~12프렛)
    for (let f = 1; f <= 12; f++) {
        const fretDiv = document.createElement('div');
        fretDiv.className = 'fret';
        fretDiv.style.width = (100 * Math.pow(0.94, f)) + 'px';

        for (let s = 0; s < 6; s++) {
            const cell = document.createElement('div');
            cell.className = 'fret-cell';
            cell.dataset.string = s;
            cell.dataset.fret = f;

            cell.onclick = (e) => {
                const sIdx = parseInt(cell.dataset.string);
                const fIdx = parseInt(cell.dataset.fret);

                // 두 번 누르면 취소 로직
                if (activeFrets[sIdx] === fIdx) {
                    activeFrets[sIdx] = 0;
                    renderFingers();
                } else {
                    activeFrets[sIdx] = fIdx;
                    renderFingers();
                }
            };
            fretDiv.appendChild(cell);
        }
        fretboard.appendChild(fretDiv);
    }

    // 2. 가로 줄 그리기 (지판 & 스트로크 구역 공통)
    function drawStrings() {
        for (let s = 0; s < 6; s++) {
            // 지판 위 줄
            const fLine = document.createElement('div');
            fLine.className = `string-line l${s+1}`;
            fretboard.appendChild(fLine);

            // 스트로크 구역 줄
            const sWrapper = document.createElement('div');
            sWrapper.className = `stroke-string l${s+1}`;
            sWrapper.style.top = (12.5 + s*15) + '%'; // 위치 조정
            
            const sLine = document.createElement('div');
            sLine.className = `string-line`;
            sLine.style.top = '50%';
            sLine.style.height = (1.5 + s*0.5) + 'px';
            
            sWrapper.appendChild(sLine);
            sWrapper.onclick = () => playNote(s);
            strokeArea.appendChild(sWrapper);
        }
    }
    drawStrings();

    // 3. 손가락 마크(동그라미) 렌더링
    function renderFingers() {
        // 기존 마크 제거
        document.querySelectorAll('.finger').forEach(f => f.remove());

        activeFrets.forEach((fret, sIdx) => {
            if (fret > 0) {
                const targetCell = document.querySelector(`.fret-cell[data-string="${sIdx}"][data-fret="${fret}"]`);
                const finger = document.createElement('div');
                finger.className = 'finger';
                finger.innerText = getNoteName(sIdx, fret);
                targetCell.appendChild(finger);
            }
        });
    }

    // 4. 사운드 재생
    function playNote(stringIdx) {
        const fret = activeFrets[stringIdx];
        const freq = openFrequencies[stringIdx] * Math.pow(2, fret / 12);
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
    }
</script>
</body>
</html>
