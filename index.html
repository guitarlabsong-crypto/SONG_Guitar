<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-min Guitar Lab - Mobile</title>
    <style>
        :root {
            --bg-navy: #0a192f;
            --fretboard-wood: #3e2723;
            --string-gold: #ffd700;
            --head-color: #263238;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-navy);
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* 모바일 스크롤 완전 방지 */
            touch-action: none; /* 브라우저 기본 제스처 무시 */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 전체 레이아웃 (가로 스크롤 가능 구역) */
        .guitar-container {
            display: flex;
            align-items: center;
            height: 70%;
            margin-top: auto;
            margin-bottom: auto;
            overflow-x: auto; /* 지판 이동용 */
            -webkit-overflow-scrolling: touch;
            padding-left: 20px;
        }

        /* 기타 헤드 */
        .guitar-head {
            min-width: 120px;
            height: 220px;
            background: var(--head-color);
            border-radius: 20px 0 0 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px;
            border: 2px solid #1a1a1a;
        }
        .tuner {
            width: 25px;
            height: 15px;
            background: #90a4ae;
            border-radius: 3px;
        }

        /* 지판 구역 */
        .fretboard-wrapper {
            display: flex;
            background: var(--fretboard-wood);
            height: 220px;
            position: relative;
            border-top: 2px solid #1a1a1a;
            border-bottom: 2px solid #1a1a1a;
        }

        .nut {
            width: 10px;
            background: #eee;
            height: 100%;
        }

        .fret {
            position: relative;
            border-right: 3px solid #b0bec5;
            min-width: 60px;
            display: flex;
            flex-direction: column;
        }

        .fret-num {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #5c6bc0;
        }

        /* 스트로크 구역 (모바일 터치용) */
        .stroke-zone {
            min-width: 180px;
            height: 220px;
            background: rgba(0,0,0,0.3);
            position: relative;
            border-left: 4px solid #000;
            touch-action: none; /* 터치 이벤트 가로채기 */
        }

        /* 줄 설정 */
        .string {
            position: absolute;
            left: 0;
            width: 100%;
            background: var(--string-gold);
            z-index: 5;
            pointer-events: none;
        }
        .s1 { top: 10%; height: 1px; }
        .s2 { top: 26%; height: 1.5px; }
        .s3 { top: 42%; height: 2px; }
        .s4 { top: 58%; height: 2.5px; }
        .s5 { top: 74%; height: 3px; }
        .s6 { top: 90%; height: 3.5px; }

        /* 클릭 포인트 */
        .fret-cell {
            flex: 1;
            z-index: 10;
        }

        .finger {
            width: 28px;
            height: 28px;
            background: #ffeb3b;
            border-radius: 50%;
            color: black;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
            font-size: 12px;
            box-shadow: 0 0 8px #ffeb3b;
        }

        .watermark {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
        }

        .guide {
            text-align: center;
            font-size: 14px;
            color: #7986cb;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="guide">지판을 눌러 코드를 잡고, 오른쪽 영역을 위아래로 쓸어보세요!</div>

    <div class="guitar-container">
        <div class="guitar-head">
            <div class="tuner"></div><div class="tuner"></div><div class="tuner"></div>
            <div style="font-size: 10px; text-align: center; color: #555;">Song Lab</div>
            <div class="tuner"></div><div class="tuner"></div><div class="tuner"></div>
        </div>

        <div class="fretboard-wrapper" id="fretboard">
            <div class="nut"></div>
            </div>

        <div class="stroke-zone" id="strokeZone">
            <div class="string s1"></div><div class="string s2"></div>
            <div class="string s3"></div><div class="string s4"></div>
            <div class="string s5"></div><div class="string s6"></div>
        </div>
    </div>

    <div class="watermark">© Song Young-min Guitar Lab</div>

<script>
    const fretboard = document.getElementById('fretboard');
    const strokeZone = document.getElementById('strokeZone');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const stringNotes = ['E', 'B', 'G', 'D', 'A', 'E'];
    const openFreqs = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41];
    const notesMaster = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    let activeFrets = [0, 0, 0, 0, 0, 0];

    // 1. 지판 생성
    for (let f = 1; f <= 13; f++) {
        const fretDiv = document.createElement('div');
        fretDiv.className = 'fret';
        fretDiv.style.minWidth = (80 * Math.pow(0.95, f)) + 'px';
        
        const num = document.createElement('div');
        num.className = 'fret-num';
        num.innerText = f;
        fretDiv.appendChild(num);

        for (let s = 0; s < 6; s++) {
            const cell = document.createElement('div');
            cell.className = 'fret-cell';
            cell.onclick = () => {
                activeFrets[s] = (activeFrets[s] === f) ? 0 : f;
                render();
            };
            fretDiv.appendChild(cell);
        }
        fretboard.appendChild(fretDiv);
    }

    // 2. 줄 렌더링 (지판 위)
    for (let s = 1; s <= 6; s++) {
        const line = document.createElement('div');
        line.className = `string s${s}`;
        fretboard.appendChild(line);
    }

    function render() {
        document.querySelectorAll('.finger').forEach(f => f.remove());
        activeFrets.forEach((fret, sIdx) => {
            if (fret > 0) {
                const targetFret = fretboard.querySelectorAll('.fret')[fret-1];
                const targetCell = targetFret.querySelectorAll('.fret-cell')[sIdx];
                const finger = document.createElement('div');
                finger.className = 'finger';
                const startIdx = notesMaster.indexOf(stringNotes[sIdx]);
                finger.innerText = notesMaster[(startIdx + fret) % 12];
                targetCell.appendChild(finger);
            }
        });
    }

    // 3. 모바일 스트로크 로직 (Touch Swipe)
    let lastStrungTime = 0;
    let lastY = 0;

    strokeZone.addEventListener('touchstart', (e) => {
        lastY = e.touches[0].clientY;
        playAll(0.05); // 터치 시 즉시 약한 스트로크
    });

    strokeZone.addEventListener('touchmove', (e) => {
        const currentY = e.touches[0].clientY;
        const diff = Math.abs(currentY - lastY);
        
        // 일정 거리 이상 움직이면 소리 재생 (스트로크 효과)
        if (diff > 30 && Date.now() - lastStrungTime > 100) {
            playAll(0.03);
            lastStrungTime = Date.now();
            lastY = currentY;
        }
    });

    function playNote(s, delay = 0) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const fret = activeFrets[s];
        const freq = openFreqs[s] * Math.pow(2, fret / 12);
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + 0.8);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + 0.8);
    }

    function playAll(gap) {
        for(let i=0; i<6; i++) playNote(i, i * gap);
    }
</script>
</body>
</html>
