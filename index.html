<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Interactive Guitar Fretboard</title>
    <style>
        :root {
            --fretboard-bg: #3d2b1f; /* 진한 나무색 */
            --fret-color: #b8b8b8;   /* 은색 프렛 */
            --string-color: #e0e0e0; /* 줄 색상 */
            --nut-color: #f5f5f5;    /* 너트(상악골) 색상 */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            margin: 0;
            overflow-x: auto;
        }

        .fretboard {
            display: flex;
            position: relative;
            background: var(--fretboard-bg);
            height: 200px;
            padding-right: 20px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 너트 (0프렛) */
        .nut {
            width: 15px;
            background: var(--nut-color);
            height: 100%;
            z-index: 2;
        }

        /* 프렛 스타일 */
        .fret {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 3px solid var(--fret-color);
            /* 실제 기타처럼 고음 프렛으로 갈수록 좁아지는 시각적 효과 */
            min-width: 50px; 
            padding: 0 5px;
        }

        /* 기타 줄 */
        .string {
            position: absolute;
            left: 0;
            width: 100%;
            background: var(--string-color);
            z-index: 1;
            cursor: pointer;
            transition: background 0.1s;
        }

        .string:hover {
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        /* 줄 번호별 두께 조절 (6번줄이 제일 두꺼움) */
        .s6 { height: 4px; top: 10%; }
        .s5 { height: 3.5px; top: 26%; }
        .s4 { height: 3px; top: 42%; }
        .s3 { height: 2.5px; top: 58%; }
        .s2 { height: 2px; top: 74%; }
        .s1 { height: 1.5px; top: 90%; }

        /* 포지션 마크 (점) */
        .dot {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
            font-family: Arial, sans-serif;
        }

        .inlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            z-index: 0;
        }
    </style>
</head>
<body>

<div class="fretboard" id="fretboard">
    <div class="nut"></div>
    </div>

<script>
    const fretboard = document.getElementById('fretboard');
    const totalFrets = 15;
    const stringCount = 6;
    
    // 표준 튜닝 주파수 (E2 ~ E4)
    const openStrings = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41]; 

    // 프렛 생성 루프
    for (let i = 1; i <= totalFrets; i++) {
        const fretDiv = document.createElement('div');
        fretDiv.className = 'fret';
        
        // 프렛 너비를 점차 좁게 설정 (수학적 비율 반영)
        fretDiv.style.width = (80 * Math.pow(0.95, i)) + 'px';

        // 포지션 마크 표시 (3, 5, 7, 9, 12, 15번 프렛)
        const dots = [3, 5, 7, 9, 12, 15];
        if (dots.includes(i)) {
            const dotLabel = document.createElement('span');
            dotLabel.className = 'dot';
            dotLabel.innerText = i;
            fretDiv.appendChild(dotLabel);
            
            const inlay = document.createElement('div');
            inlay.className = 'inlay';
            fretDiv.appendChild(inlay);
        }

        fretboard.appendChild(fretDiv);
    }

    // 줄 생성 및 클릭 이벤트
    openStrings.forEach((freq, idx) => {
        const stringElem = document.createElement('div');
        stringElem.className = `string s${idx + 1}`;
        
        // 클릭 시 소리 재생 (Web Audio API)
        stringElem.onclick = () => playGuitarSound(freq);
        
        fretboard.appendChild(stringElem);
    });

    // 간단한 사운드 엔진
    function playGuitarSound(frequency) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'triangle'; // 기타와 유사한 부드러운 파형
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 1);
    }
</script>

</body>
</html>
