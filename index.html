<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-min Guitar Lab</title>
    <style>
        :root {
            --navy-bg: #0a192f;
            --fret-gold: #c5a059;
            --string-silver: #e0e0e0;
            --wood: #3e2723;
        }

        body {
            margin: 0; background: var(--navy-bg); color: white;
            font-family: 'Pretendard', sans-serif; overflow: hidden;
            touch-action: none; display: flex; flex-direction: column; height: 100vh;
        }

        /* 기타 본체 레이아웃 */
        .guitar-body {
            display: flex; align-items: center; margin: auto 0;
            padding-left: 10px; height: 260px; position: relative;
        }

        /* 1. 개선된 기타 헤드 모양 */
        .headstock {
            width: 100px; height: 200px; background: #1a1a1a;
            border-radius: 10px 30px 30px 10px; position: relative;
            border: 2px solid #333; flex-shrink: 0;
            display: flex; flex-wrap: wrap; justify-content: space-around; padding: 10px;
        }
        .peg {
            width: 20px; height: 12px; background: #777; border-radius: 4px;
        }

        /* 2. 지판 (1~13프렛) */
        .fretboard {
            display: flex; background: var(--wood); height: 220px;
            position: relative; border-top: 4px solid #222; border-bottom: 4px solid #222;
        }
        .nut { width: 12px; background: #fff; height: 100%; z-index: 10; }
        
        .fret {
            position: relative; border-right: 3px solid var(--fret-gold);
            display: flex; flex-direction: column; min-width: 65px;
        }
        .fret-num {
            position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%);
            font-size: 12px; color: #8892b0;
        }

        /* 3. 스트로크 구역 (반응형 영역) */
        .stroke-box {
            width: 180px; height: 220px; background: rgba(0,0,0,0.4);
            border-left: 5px solid #000; position: relative; touch-action: none;
        }

        /* 줄 디자인 */
        .string {
            position: absolute; left: 0; width: 100%; background: var(--string-silver);
            z-index: 5; pointer-events: none; opacity: 0.8;
        }
        /* 1번줄(상단) ~ 6번줄(하단) 두께 및 위치 */
        .s1 { top: 10%; height: 1px; }
        .s2 { top: 26%; height: 1.5px; }
        .s3 { top: 42%; height: 2px; }
        .s4 { top: 58%; height: 2.5px; }
        .s5 { top: 74%; height: 3px; }
        .s6 { top: 90%; height: 3.5px; }

        /* 지판 터치 영역 */
        .fret-cell {
            flex: 1; position: relative; z-index: 15;
            display: flex; justify-content: center; align-items: center;
        }

        /* 가상 손가락 (알파벳 표기) */
        .finger-mark {
            width: 30px; height: 30px; background: #ffeb3b; border-radius: 50%;
            color: black; font-weight: bold; font-size: 13px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 10px #ffeb3b;
        }

        .watermark {
            position: fixed; bottom: 15px; right: 20px;
            font-size: 13px; color: #64ffda; opacity: 0.5;
        }

        .info { text-align: center; color: #8892b0; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="info">지판을 눌러 코드를 잡고 오른쪽을 쓸어 넘기세요 (Stroke)</div>

    <div class="guitar-body">
        <div class="headstock">
            <div class="peg"></div><div class="peg"></div>
            <div class="peg"></div><div class="peg"></div>
            <div class="peg"></div><div class="peg"></div>
        </div>

        <div class="fretboard" id="fretboard">
            <div class="nut"></div>
        </div>

        <div class="stroke-box" id="strokeBox">
            <div class="string s1"></div><div class="string s2"></div>
            <div class="string s3"></div><div class="string s4"></div>
            <div class="string s5"></div><div class="string s6"></div>
        </div>
    </div>

    <div class="watermark">© SONG YOUNG-MIN GUITAR LAB</div>

<script>
    const fretboard = document.getElementById('fretboard');
    const strokeBox = document.getElementById('strokeBox');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const openNotes = ['E', 'B', 'G', 'D', 'A', 'E']; // 1번~6번줄
    const openFreqs = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41];
    const notesArr = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    // 현재 각 줄의 프렛 상태 (0은 안 누름)
    let currentChords = [0, 0, 0, 0, 0, 0];

    // 1. 지판 및 터치 영역 생성
    for (let f = 1; f <= 13; f++) {
        const fret = document.createElement('div');
        fret.className = 'fret';
        fret.style.minWidth = (90 * Math.pow(0.945, f)) + 'px';
        
        const num = document.createElement('div');
        num.className = 'fret-num'; num.innerText = f;
        fret.appendChild(num);

        for (let s = 0; s < 6; s++) {
            const cell = document.createElement('div');
            cell.className = 'fret-cell';
            cell.dataset.string = s;
            cell.dataset.fret = f;
            
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const sIdx = parseInt(cell.dataset.string);
                const fIdx = parseInt(cell.dataset.fret);
                
                // 토글 로직
                currentChords[sIdx] = (currentChords[sIdx] === fIdx) ? 0 : fIdx;
                updateVisuals();
            });
            fret.appendChild(cell);
        }
        fretboard.appendChild(fret);
    }

    // 줄 추가 (시각용)
    for (let s = 1; s <= 6; s++) {
        const l = document.createElement('div');
        l.className = `string s${s}`;
        fretboard.appendChild(l);
    }

    function updateVisuals() {
        document.querySelectorAll('.finger-mark').forEach(m => m.remove());
        currentChords.forEach((fret, sIdx) => {
            if (fret > 0) {
                const targetFret = fretboard.querySelectorAll('.fret')[fret-1];
                const targetCell = targetFret.querySelectorAll('.fret-cell')[sIdx];
                const mark = document.createElement('div');
                mark.className = 'finger-mark';
                
                // 음이름 계산
                const baseIdx = notesArr.indexOf(openNotes[sIdx]);
                mark.innerText = notesArr[(baseIdx + fret) % 12];
                targetCell.appendChild(mark);
            }
        });
    }

    // 2. 스트로크 로직 (음정 반영)
    function playNote(sIdx, delay = 0) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const fret = currentChords[sIdx];
        const frequency = openFreqs[sIdx] * Math.pow(2, fret / 12);
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = (sIdx > 3) ? 'sine' : 'triangle'; // 저음은 부드럽게, 고음은 선명하게
        osc.frequency.setValueAtTime(frequency, audioCtx.currentTime + delay);
        
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + 1.2);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + 1.2);
    }

    // 터치 이동 감지 (진짜 스트로크)
    let startY = 0;
    strokeBox.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
    });

    strokeBox.addEventListener('touchend', (e) => {
        const endY = e.changedTouches[0].clientY;
        const distance = endY - startY;

        if (Math.abs(distance) > 20) {
            // 다운 스트로크 (위에서 아래로)
            if (distance > 0) {
                for(let i=0; i<6; i++) playNote(i, i * 0.05);
            } 
            // 업 스트로크 (아래에서 위로)
            else {
                for(let i=5; i>=0; i--) playNote(i, (5-i) * 0.05);
            }
        } else {
            // 그냥 터치 시에도 소리 나게 (피킹)
            for(let i=0; i<6; i++) playNote(i, 0);
        }
    });

</script>
</body>
</html>
