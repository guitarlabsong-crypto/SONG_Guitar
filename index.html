<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Song Young-min Guitar Lab - Simulator</title>
    <style>
        :root {
            --fretboard-bg: #4e342e; 
            --fret-color: #d1d1d1;
            --string-color: #bdc3c7;
            --nut-color: #fff;
            --finger-color: #ffc107;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            color: white;
            overflow: hidden; /* 스크롤 방지 */
        }

        .container {
            display: flex;
            align-items: flex-start;
            position: relative;
            background: #222;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        /* 워터마크 */
        .watermark {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        /* 지판 구역 */
        .fretboard {
            display: flex;
            position: relative;
            background: var(--fretboard-bg);
            height: 240px;
            border-top: 2px solid #333;
            border-bottom: 2px solid #333;
        }

        .nut {
            width: 15px;
            background: var(--nut-color);
            height: 100%;
            z-index: 10;
        }

        .fret {
            position: relative;
            border-right: 4px solid var(--fret-color);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 프렛 번호 */
        .fret-number {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #888;
        }

        /* 스트로크 구역 */
        .stroke-area {
            position: relative;
            width: 250px;
            height: 240px;
            background: #261a17;
            border-left: 5px solid #000;
        }

        /* 줄 스타일 */
        .string-line {
            position: absolute;
            left: 0;
            width: 100%;
            background: var(--string-color);
            z-index: 5;
            pointer-events: none;
        }

        /* 1번줄이 위쪽 */
        .l1 { top: 12.5%; height: 1.5px; }
        .l2 { top: 27.5%; height: 2px; }
        .l3 { top: 42.5%; height: 2.5px; }
        .l4 { top: 57.5%; height: 3px; }
        .l5 { top: 72.5%; height: 3.5px; }
        .l6 { top: 87.5%; height: 4px; }

        .fret-cell {
            flex: 1;
            width: 100%;
            z-index: 7;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 손가락 마크 */
        .finger {
            width: 32px;
            height: 32px;
            background: var(--finger-color);
            border-radius: 50%;
            color: #000;
            font-weight: 800;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255,193,7,0.5);
            z-index: 20;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }

        .controls {
            margin-top: 50px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 15px 30px;
            border-radius: 10px;
        }

        kbd {
            background: #444;
            padding: 3px 8px;
            border-radius: 4px;
            color: #ffc107;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="fretboard" id="fretboard">
            <div class="nut"><div class="fret-number">0</div></div>
            </div>

        <div class="stroke-area" id="strokeArea"></div>

        <div class="watermark">© Song Young-min Guitar Lab</div>
    </div>

    <div class="controls">
        <p>🖱️ <b>지판 클릭:</b> 코드 운지 (다시 누르면 취소) | 🎹 <b>방향키 & Space:</b> 스트로크/피킹</p>
        <p><kbd>↑</kbd> <kbd>↓</kbd> 전체 스트로크 | <kbd>←</kbd> <kbd>→ / Space</kbd> 저음/고음부 피킹</p>
    </div>

<script>
    const fretboard = document.getElementById('fretboard');
    const strokeArea = document.getElementById('strokeArea');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const stringNotes = ['E', 'B', 'G', 'D', 'A', 'E'];
    const openFreqs = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41];
    const notesMaster = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    let activeFrets = [0, 0, 0, 0, 0, 0];

    // 1. 1~13프렛 생성
    for (let f = 1; f <= 13; f++) {
        const fretDiv = document.createElement('div');
        fretDiv.className = 'fret';
        fretDiv.style.width = (110 * Math.pow(0.945, f)) + 'px';

        const num = document.createElement('div');
        num.className = 'fret-number';
        num.innerText = f;
        fretDiv.appendChild(num);

        for (let s = 0; s < 6; s++) {
            const cell = document.createElement('div');
            cell.className = 'fret-cell';
            cell.onclick = () => toggleFret(s, f);
            fretDiv.appendChild(cell);
        }
        fretboard.appendChild(fretDiv);
    }

    // 2. 줄 그리기
    for (let s = 0; s < 6; s++) {
        const fLine = document.createElement('div');
        fLine.className = `string-line l${s+1}`;
        fretboard.appendChild(fLine);

        const sLine = document.createElement('div');
        sLine.className = `string-line l${s+1}`;
        strokeArea.appendChild(sLine);
    }

    function toggleFret(s, f) {
        if (activeFrets[s] === f) activeFrets[s] = 0;
        else activeFrets[s] = f;
        renderFingers();
    }

    function renderFingers() {
        document.querySelectorAll('.finger').forEach(f => f.remove());
        activeFrets.forEach((fret, sIdx) => {
            if (fret > 0) {
                // n번째 프렛의 s번째 cell 찾기
                const targetFret = fretboard.querySelectorAll('.fret')[fret-1];
                const targetCell = targetFret.querySelectorAll('.fret-cell')[sIdx];
                
                const finger = document.createElement('div');
                finger.className = 'finger';
                const startIdx = notesMaster.indexOf(stringNotes[sIdx]);
                finger.innerText = notesMaster[(startIdx + fret) % 12];
                targetCell.appendChild(finger);
            }
        });
    }

    // 사운드 함수
    function playNote(s, delay = 0) {
        const fret = activeFrets[s];
        const freq = openFreqs[s] * Math.pow(2, fret / 12);
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);

        gain.gain.setValueAtTime(0.5, audioCtx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + 1);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + 1);
    }

    // 3. 키보드 이벤트 (스크롤 방지 및 스트로크)
    window.addEventListener('keydown', (e) => {
        if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
            e.preventDefault(); // 스크롤 방지
        }

        if (e.key === 'ArrowDown') { // 다운 스트로크
            for(let i=0; i<6; i++) playNote(i, i * 0.03);
        } else if (e.key === 'ArrowUp') { // 업 스트로크
            for(let i=5; i>=0; i--) playNote(i, (5-i) * 0.03);
        } else if (e.key === 'ArrowLeft') { // 저음부 (4,5,6번줄)
            [3, 4, 5].forEach(i => playNote(i));
        } else if (e.key === 'ArrowRight' || e.key === ' ') { // 고음부 (1,2,3번줄)
            [0, 1, 2].forEach(i => playNote(i));
        }
    });
</script>
</body>
</html>
